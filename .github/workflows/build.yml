name: build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '30 5 1,15 * *'

env:
  NUMBA_DISABLE_JIT: 0

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:

      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.0"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Cache LDB database
        uses: actions/cache@v4
        with:
          path: ~/.local/share/gismap
          key: ldb-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ldb-${{ matrix.python-version }}-

      - run: uv sync --all-extras
      - run: uv run pytest

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
