name: build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '30 5 1,15 * *'

env:
  NUMBA_DISABLE_JIT: 0
  TQDM_DISABLE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:

      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.0"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Cache LDB database
        uses: actions/cache@v4
        with:
          path: ~/.local/share/gismap
          key: ldb-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - run: uv sync --all-extras

      # Network-heavy tests (live DBLP doctests; live scraping of lab
      # websites like irif.fr / lamsade / lincs / laas) are kept only on the
      # 3.12 runner (the one feeding Codecov). With 4 matrix runners hitting
      # the same endpoints in parallel, the remote side issues temporary
      # bans, and the suite stalls for ~20 min on exponential backoff before
      # `+FLAKY` (DBLP) downgrades to skip or `test_lab_examples` outright
      # fails on a ConnectionError. Coverage is preserved on 3.12.
      - name: Run tests
        run: uv run pytest ${{ matrix.python-version != '3.12' && '--ignore=gismap/sources/dblp.py --ignore=tests/test_lab_examples.py' || '' }}

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
