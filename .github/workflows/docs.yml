name: docs

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Force full rebuild (re-execute all notebooks)'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.0"

      - name: Setup Pandoc
        uses: pandoc/actions/setup@v1
        with:
          version: '3.9'

      - name: Cache virtual environment
        id: venv-cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('uv.lock') }}

      - name: Restore Sphinx build cache
        if: inputs.full_rebuild != true && steps.venv-cache.outputs.cache-hit == 'true'
        uses: actions/cache/restore@v4
        with:
          path: build
          key: docs-${{ hashFiles('uv.lock', 'docs/**', 'gismap/**') }}
          restore-keys: docs-

      - name: Build Sphinx documentation
        run: |
          FLAGS="-b html"
          if [ "${{ inputs.full_rebuild }}" = "true" ]; then
            FLAGS="-a -E -b html"
          fi
          uv sync --all-extras
          uv run sphinx-build $FLAGS docs build

      - name: Save Sphinx build cache
        if: always() && inputs.full_rebuild != true
        uses: actions/cache/save@v4
        with:
          path: build
          key: docs-${{ hashFiles('uv.lock', 'docs/**', 'gismap/**') }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
