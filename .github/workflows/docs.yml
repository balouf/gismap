name: docs

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Force full rebuild (re-execute all notebooks, ignore cache)'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  list-notebooks:
    runs-on: ubuntu-latest
    outputs:
      notebooks: ${{ steps.find.outputs.notebooks }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          notebooks=$(find docs -name "*.ipynb" -not -path "*/.ipynb_checkpoints/*" | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "notebooks=$notebooks" >> "$GITHUB_OUTPUT"

  execute-notebooks:
    needs: list-notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        notebook: ${{ fromJson(needs.list-notebooks.outputs.notebooks) }}
    steps:

      - uses: actions/checkout@v4

      - name: Cache executed notebook
        if: inputs.full_rebuild != true
        id: nb-cache
        uses: actions/cache@v4
        with:
          path: .notebook-cache
          key: nb-${{ hashFiles(matrix.notebook, 'uv.lock') }}-${{ matrix.notebook }}

      - name: Restore from cache
        if: steps.nb-cache.outputs.cache-hit == 'true'
        run: cp .notebook-cache/executed.ipynb "${{ matrix.notebook }}"

      - name: Set up uv
        if: steps.nb-cache.outputs.cache-hit != 'true'
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.0"
          enable-cache: true

      - name: Execute notebook
        if: steps.nb-cache.outputs.cache-hit != 'true'
        run: |
          uv sync --all-extras
          mkdir -p .notebook-cache
          uv run jupyter nbconvert --execute --to notebook --inplace \
            "${{ matrix.notebook }}" --ExecutePreprocessor.timeout=1800
          cp "${{ matrix.notebook }}" .notebook-cache/executed.ipynb

      - name: Upload executed notebook
        uses: actions/upload-artifact@v4
        with:
          name: notebook-${{ strategy.job-index }}
          path: ${{ matrix.notebook }}
          retention-days: 1

  build-docs:
    needs: execute-notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:

      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.0"
          enable-cache: true

      - uses: pandoc/actions/setup@v1
        with:
          version: '3.9'

      - run: uv sync --all-extras

      - name: Download executed notebooks
        uses: actions/download-artifact@v4
        with:
          pattern: notebook-*
          path: _nb
          merge-multiple: true

      - name: Overlay executed notebooks
        run: |
          find _nb -name "*.ipynb" | while read nb; do
            target="${nb#_nb/}"
            cp "$nb" "$target"
          done

      - name: Build Sphinx documentation
        run: NBSPHINX_EXECUTE=never uv run sphinx-build -b html docs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
